site_name: WYF的个人网站
site_url: https://ryan1702.github.io/first-website/
site_author: WYF
site_description: WYF的个人网站

nav:
  - 首页: index.md
  - 个人介绍: about.md
  - 课内学习:
    - 学习计划: in-school/plan.md
  - 课外学习:
    - 算法竞赛:
      - 学习计划: out-school/algorithms/plan.md
      - 算法大全:
        - 高精度:
          - 高精度加法: out-school/algorithms/算法大全/高精度/加法.md
      - 题解:
        - 企鹅: out-school/algorithms/题解/企鹅.md

theme:
  name: material
  language: zh
  palette:
    # 日间模式
    - scheme: default
      primary: indigo
      accent: orange
      toggle:
        icon: material/weather-night
        name: 切换至夜间模式
    # 夜间模式
    - scheme: slate
      primary: indigo
      accent: orange
      toggle:
        icon: material/weather-sunny
        name: 切换至日间模式
  features:
    - navigation.tabs      # 使用 Tab 分类
    - navigation.top       # 返回顶部按钮
    - navigation.indexes   # 点击 Tab 可直接打开说明页
    - search.suggest       # 搜索补全
    - search.highlight     # 搜索高亮
    - content.code.copy    # 代码一键复制
    - content.action.edit  # 编辑源文件按钮
  icon:
    repo: fontawesome/brands/github

edit_uri: edit/main/docs/
repo_url: https://github.com/ryan1702/first-website/
repo_name: first-website
copyright: 吴悠凡 CC-BY-4.0

extra:
  social:
    - name: GitHub | Ryan1702
      icon: fontawesome/brands/github
      link: https://github.com/Ryan1702

plugins:
  - search:
      lang: [zh, en]
  - tags

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.highlight:
      linenums: true
      auto_title: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.tasklist:
      custom_checkbox: true
      clickable_checkbox: false
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - footnotes

# 仅保留外链 CDN 支持数学公式，删除了不存在的本地文件
extra_javascript:
  - https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.7/katex.min.js
  - https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.7/contrib/auto-render.min.js
  - javascripts/katex-init.js
extra_css:
  - https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.7/katex.min.css